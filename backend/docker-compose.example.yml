# backend/docker-compose.yml - COMPLETO Y FUNCIONAL
version: "3.8"

services:
  # Base de datos vectorial
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    environment:
      QDRANT_API_KEY: "test_key_dev"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - loremaster

  # Base de datos relacional
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: loremaster
      POSTGRES_PASSWORD: loremaster
      POSTGRES_DB: loremaster
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - loremaster
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loremaster"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache semántico
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - loremaster
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Visor SQLite para desarrollo local (arrancar con: docker-compose --profile tools up -d)
  sqlite-web:
    image: coleifer/sqlite-web:latest
    container_name: sqlite-web
    profiles:
      - tools
    ports:
      - "8080:8080"
    volumes:
      - ./loremaster.db:/data/loremaster.db
    command: ["-H", "0.0.0.0", "-p", "8080", "/data/loremaster.db"]
    networks:
      - loremaster

  # S3 local (dev)
  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=1
    volumes:
      - "${TMPDIR:-.}:/tmp/localstack"
    networks:
      - loremaster

  # Monitoreo (opcional para Sem 2, pero preparar)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - loremaster

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - loremaster

volumes:
  qdrant_data:
  postgres_data:

networks:
  loremaster:
    driver: bridge