services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - loremaster

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    profiles:
      - postgres
    environment:
      POSTGRES_USER: loremaster
      POSTGRES_PASSWORD: loremaster
      POSTGRES_DB: loremaster
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - loremaster
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loremaster"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - loremaster
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
  postgres_data:

networks:
  loremaster:
    driver: bridge
